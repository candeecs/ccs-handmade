<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu encargo! | CCS Handmade</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Unos estilos rápidos exclusivos para centrar este mensaje */
        .seccion-gracias {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: #EEECE3;
        }
        .caja-gracias {
            background-color: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            max-width: 500px;
        }
        .caja-gracias h2 {
            color: #A4B7A3;
            margin-bottom: 15px;
            font-size: 28px;
        }
        .caja-gracias p {
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <main class="seccion-gracias">
        <div class="caja-gracias">
            <h2>¡Mensaje recibido! 🧸</h2>
            <p>Muchas gracias por escribir. Ya tengo tu idea en mi bandeja de entrada. Le echaré un ojo lo antes posible y te contestaré al correo para concretar los detalles.</p>
            <a href="index.html" class="btn-cozy" style="text-decoration: none;">Volver al inicio</a>
        </div>
        <div class="contenedor-logo-final">
            <img src="logo.png" alt="Logo CCS Handmade" class="logo-final-grande">
        </div>
    </main>

</body>
</html>
